name: Vercel Production Deployment
run-name: Vercel Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
         OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes)
         echo "$OUTPUT"

         # ambil URL alias (yang TANPA random)
         CLEAN_URL=$(echo "$OUTPUT" | grep -o 'https://github-vercel-five.vercel.app')
         echo "url=$CLEAN_URL" >> $GITHUB_OUTPUT

      - name: Debug URL
        run: echo "${{ steps.deploy.outputs.url }}"

      - name: Wait for deployment
        run: sleep 15

      - name: Check deployment result
        run: curl -I ${{ steps.deploy.outputs.url }}
  

